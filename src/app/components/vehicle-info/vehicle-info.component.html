<div class="modal-overlay" (click)="close.emit()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ isAdmin ? "Редагування тех. даних" : "Технічний паспорт" }}</h2>
      <button class="close-x" (click)="close.emit()">×</button>
    </div>

    <form [formGroup]="vehicleForm" (ngSubmit)="save()">
      <div class="modal-body">
        <div class="edit-row">
          <div class="edit-group">
            <label>VIN-код:</label>
            <input
              formControlName="vin"
              type="text"
              placeholder="17 символів"
              class="uppercase"
              maxlength="17"
            />
          </div>
        </div>

        <div class="edit-row two-cols">
          <div class="edit-group">
            <label>Рік випуску:</label>
            <input
              formControlName="manufactureYear"
              type="number"
              placeholder="2024"
            />
          </div>
          <div class="edit-group">
            <label>Об'єм баку (л):</label>
            <input
              formControlName="fuelTankCapacity"
              type="number"
              placeholder="60"
            />
          </div>
        </div>

        <div class="edit-row two-cols">
          <div class="edit-group">
            <label>Тип пального:</label>
            <select formControlName="fuelType">
              <option value="Дизель">Дизель</option>
              <option value="Бензин">Бензин</option>
              <option value="Газ/Бензин">Газ/Бензин</option>
            </select>
          </div>
          <div class="edit-group">
            <label>Витрата (л/100км):</label>
            <input formControlName="consumption" type="number" step="0.1" />
          </div>
        </div>

        <div class="edit-group">
          <label>Додаткові примітки (стан, спецобладнання):</label>
          <textarea
            formControlName="notes"
            rows="3"
            placeholder="Наприклад: встановлено лебідку, потребує заміни мастила через 2000 км..."
          ></textarea>
        </div>
      </div>

      <div class="modal-footer">
        <button
          *ngIf="isAdmin"
          type="submit"
          class="btn-save"
          [disabled]="vehicleForm.invalid"
        >
          Зберегти зміни
        </button>
        <button type="button" class="btn-cancel" (click)="close.emit()">
          {{ isAdmin ? "Скасувати" : "Закрити" }}
        </button>
      </div>
    </form>
  </div>
</div>
